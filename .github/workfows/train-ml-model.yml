name: Train ML Model Daily

on:
  schedule:
    - cron: '0 2 * * *'  # Tous les jours à 2h du matin UTC
  workflow_dispatch:  # Permet le déclenchement manuel

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    # Étape 1 : Checkout du code
    - name: Checkout repository
      uses: actions/checkout@v3
    
    # Étape 2 : Installer Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    # Étape 3 : Installer les dépendances
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt
    
    # Étape 4 : Exécuter le script d'entraînement
    - name: Train ML model
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        echo "Démarrage de l'entraînement..."
        python scripts/train_light_ml_model.py
        echo "Entraînement terminé !"
    
    # Étape 5 : Sauvegarder le modèle (optionnel)
    - name: Upload model artifact
      uses: actions/upload-artifact@v3
      with:
        name: trained-model-${{ github.run_id }}
        path: models/
        retention-days: 7