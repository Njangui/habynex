<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ===== FAVICONS COMPLETS ===== -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#F97316" />
    
    <!-- ===== PWA / MANIFEST ===== -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#F97316" />
    <meta name="msapplication-TileColor" content="#F97316" />
    <meta name="msapplication-TileImage" content="/mstile-150x150.png" />
    
    <!-- ===== MOBILE WEB APP ===== -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Habynex" />
    
    <!-- ===== SEO DE BASE ===== -->
    <title>Habynex - Trouvez ou proposez votre logement idéal au Cameroun</title>
    <meta name="description" content="Plateforme immobilière intelligente au Cameroun. Trouvez ou proposez votre appartement, studio ou maison avec notre assistant IA." />
    <meta name="author" content="Habynex" />
    <meta name="keywords" content="immobilier, cameroun, location, vente, appartement, studio, maison, yaoundé, douala" />
    
    <!-- ===== OPEN GRAPH (Facebook, LinkedIn, WhatsApp) ===== -->
    <meta property="og:site_name" content="Habynex" />
    <meta property="og:title" content="Habynex - Immobilier Intelligent au Cameroun" />
    <meta property="og:description" content="Trouvez ou proposez votre logement idéal avec notre assistant IA. Location et vente au Cameroun." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.habynex.com" />
    <meta property="og:image" content="https://www.habynex.com/android-chrome-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Logo Habynex - Plateforme immobilière" />
    <meta property="og:locale" content="fr_FR" />
    
    <!-- ===== TWITTER CARD ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Habynex" />
    <meta name="twitter:title" content="Habynex - Immobilier Intelligent au Cameroun" />
    <meta name="twitter:description" content="Trouvez votre logement idéal avec notre assistant IA" />
    <meta name="twitter:image" content="https://www.habynex.com/android-chrome-512x512.png" />
    
    <!-- ===== CONTENT SECURITY POLICY (CSP) ===== -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval';
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' data: https://fonts.gstatic.com;
  img-src 'self' data: blob: https://*.supabase.co https://images.unsplash.com https:;
  connect-src 'self' https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com https://habynex-recommendations-systeme-v1.onrender.com;
  frame-src 'self' https://www.openstreetmap.org;
  manifest-src 'self';
">
    
    <!-- ===== GOOGLE KNOWLEDGE GRAPH (JSON-LD) ===== -->
    <!-- CECI FORCE GOOGLE À UTILISER VOTRE LOGO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Habynex",
      "alternateName": "Habynex Immobilier",
      "url": "https://www.habynex.com",
      "logo": "https://www.habynex.com/android-chrome-512x512.png",
      "image": [
        "https://www.habynex.com/android-chrome-512x512.png",
        "https://www.habynex.com/android-chrome-192x192.png"
      ],
      "description": "Plateforme immobilière intelligente propulsée par l'IA au Cameroun",
      "foundingDate": "2024",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "CM",
        "addressLocality": "Yaoundé"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["French", "English"]
      },
      "sameAs": [
        "https://www.facebook.com/habynex",
        "https://www.linkedin.com/company/habynex",
        "https://twitter.com/Habynex"
      ]
    }
    </script>
    
    <!-- ===== WEBSITE SCHEMA ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Habynex",
      "url": "https://www.habynex.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.habynex.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- ===== PRECONNECT (Performance) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- ===== CANONICAL URL ===== -->
    <link rel="canonical" href="https://www.habynex.com" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
